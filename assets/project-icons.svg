<svg xmlns="http://www.w3.org/2000/svg" width="600" height="100" viewBox="0 0 600 100" fill="none">
  <defs>
    <linearGradient id="iconGrad1" x1="0" y1="0" x2="100" y2="100">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="iconGrad2" x1="0" y1="0" x2="100" y2="100">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="iconGrad3" x1="0" y1="0" x2="100" y2="100">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="iconGrad4" x1="0" y1="0" x2="100" y2="100">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="iconGrad5" x1="0" y1="0" x2="100" y2="100">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="iconGrad6" x1="0" y1="0" x2="100" y2="100">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
  </defs>

  <!-- Sentinel AI — Shield -->
  <g transform="translate(50,50)">
    <circle r="30" fill="url(#iconGrad1)" opacity="0.12"/>
    <path d="M0,-18 L14,0 L8,18 L-8,18 L-14,0 Z" stroke="url(#iconGrad1)" stroke-width="2" fill="none"/>
    <circle r="5" fill="#38BDF8" opacity="0.6"/>
    <text y="45" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" fill="#94A3B8">Sentinel</text>
  </g>

  <!-- Elysium — Diamond -->
  <g transform="translate(150,50)">
    <circle r="30" fill="url(#iconGrad2)" opacity="0.12"/>
    <path d="M0,-16 L16,0 L0,16 L-16,0 Z" stroke="url(#iconGrad2)" stroke-width="2" fill="none"/>
    <path d="M0,-8 L8,0 L0,8 L-8,0 Z" fill="#8B5CF6" opacity="0.4"/>
    <text y="45" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" fill="#94A3B8">Elysium</text>
  </g>

  <!-- OsteoVision — Medical Cross -->
  <g transform="translate(250,50)">
    <circle r="30" fill="url(#iconGrad3)" opacity="0.12"/>
    <rect x="-4" y="-14" width="8" height="28" rx="2" fill="none" stroke="url(#iconGrad3)" stroke-width="2"/>
    <rect x="-14" y="-4" width="28" height="8" rx="2" fill="none" stroke="url(#iconGrad3)" stroke-width="2"/>
    <circle r="3" fill="#22D3EE" opacity="0.5"/>
    <text y="45" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" fill="#94A3B8">OsteoVision</text>
  </g>

  <!-- PCMFMS — Brain/Lightning -->
  <g transform="translate(350,50)">
    <circle r="30" fill="url(#iconGrad4)" opacity="0.12"/>
    <path d="M2,-16 L-8,-2 L0,-2 L-2,16 L8,2 L0,2 Z" stroke="url(#iconGrad4)" stroke-width="2" fill="none"/>
    <text y="45" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" fill="#94A3B8">PCMFMS</text>
  </g>

  <!-- FlowCast AI — Chart -->
  <g transform="translate(450,50)">
    <circle r="30" fill="url(#iconGrad5)" opacity="0.12"/>
    <polyline points="-12,10 -4,-2 4,6 12,-10" stroke="url(#iconGrad5)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="-14" y1="14" x2="14" y2="14" stroke="#10B981" stroke-width="1" opacity="0.4"/>
    <text y="45" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" fill="#94A3B8">FlowCast</text>
  </g>

  <!-- Aabha — Eye/Accessibility -->
  <g transform="translate(550,50)">
    <circle r="30" fill="url(#iconGrad6)" opacity="0.12"/>
    <ellipse rx="14" ry="9" fill="none" stroke="url(#iconGrad6)" stroke-width="2"/>
    <circle r="5" fill="none" stroke="#EC4899" stroke-width="1.5"/>
    <circle r="2" fill="#EC4899" opacity="0.6"/>
    <text y="45" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" fill="#94A3B8">Aabha</text>
  </g>
</svg>
