<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" fill="none">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1200" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="40%" stop-color="#111827"/>
      <stop offset="70%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="heroAccent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="30%" stop-color="#38BDF8" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#22D3EE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="350" y1="100" x2="850" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="subtitleGrad" x1="350" y1="160" x2="850" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#heroBg)"/>

  <!-- Accent glow line at bottom -->
  <rect x="0" y="274" width="1200" height="6" fill="url(#heroAccent)"/>

  <!-- Decorative dots -->
  <circle cx="100" cy="60" r="1.5" fill="#38BDF8" opacity="0.4"/>
  <circle cx="200" cy="40" r="1" fill="#8B5CF6" opacity="0.3"/>
  <circle cx="350" cy="70" r="1.5" fill="#22D3EE" opacity="0.35"/>
  <circle cx="850" cy="50" r="1" fill="#38BDF8" opacity="0.3"/>
  <circle cx="1000" cy="65" r="1.5" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="1100" cy="45" r="1" fill="#22D3EE" opacity="0.3"/>
  <circle cx="150" cy="220" r="1" fill="#38BDF8" opacity="0.25"/>
  <circle cx="500" cy="240" r="1.5" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="700" cy="230" r="1" fill="#22D3EE" opacity="0.25"/>
  <circle cx="1050" cy="215" r="1.5" fill="#38BDF8" opacity="0.3"/>

  <!-- Name -->
  <text x="600" y="120" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="url(#textGrad)" letter-spacing="2">Aryan Medigeri</text>

  <!-- Subtitle -->
  <text x="600" y="165" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="url(#subtitleGrad)" letter-spacing="4">AI ENGINEER  •  FULL STACK DEVELOPER  •  BUILDER</text>

  <!-- Tagline -->
  <text x="600" y="205" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" font-weight="300" fill="#64748B" letter-spacing="1">Building intelligent systems that solve real problems at scale</text>
</svg>
