<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="200" viewBox="0 0 1000 200" fill="none">
  <defs>
    <linearGradient id="wfBg" x1="0" y1="0" x2="1000" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="wfLine" x1="50" y1="65" x2="950" y2="65" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="200" rx="12" fill="url(#wfBg)"/>
  <rect width="1000" height="200" rx="12" stroke="#1E293B" stroke-width="1" fill="none"/>

  <!-- Connecting line -->
  <line x1="70" y1="65" x2="930" y2="65" stroke="url(#wfLine)" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- Step 1: Problem -->
  <circle cx="70" cy="65" r="14" fill="#38BDF8" opacity="0.15"/>
  <circle cx="70" cy="65" r="8" fill="#38BDF8"/>
  <text x="70" y="100" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#38BDF8">Problem</text>
  <text x="70" y="115" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748B">Identify</text>

  <!-- Step 2: Research -->
  <circle cx="166" cy="65" r="14" fill="#3B82F6" opacity="0.15"/>
  <circle cx="166" cy="65" r="8" fill="#3B82F6"/>
  <text x="166" y="100" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#3B82F6">Research</text>
  <text x="166" y="115" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748B">Explore</text>

  <!-- Step 3: Architecture -->
  <circle cx="262" cy="65" r="14" fill="#5B5CF6" opacity="0.15"/>
  <circle cx="262" cy="65" r="8" fill="#5B5CF6"/>
  <text x="262" y="100" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#5B5CF6">Architect</text>
  <text x="262" y="115" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748B">Design</text>

  <!-- Step 4: Prototype -->
  <circle cx="358" cy="65" r="14" fill="#7C3AED" opacity="0.15"/>
  <circle cx="358" cy="65" r="8" fill="#7C3AED"/>
  <text x="358" y="100" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#7C3AED">Prototype</text>
  <text x="358" y="115" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748B">Build</text>

  <!-- Step 5: Training -->
  <circle cx="454" cy="65" r="14" fill="#8B5CF6" opacity="0.15"/>
  <circle cx="454" cy="65" r="8" fill="#8B5CF6"/>
  <text x="454" y="100" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#8B5CF6">Training</text>
  <text x="454" y="115" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748B">Model</text>

  <!-- Step 6: Evaluation -->
  <circle cx="550" cy="65" r="14" fill="#A855F7" opacity="0.15"/>
  <circle cx="550" cy="65" r="8" fill="#A855F7"/>
  <text x="550" y="100" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#A855F7">Evaluate</text>
  <text x="550" y="115" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748B">Metrics</text>

  <!-- Step 7: Optimization -->
  <circle cx="646" cy="65" r="14" fill="#8B5CF6" opacity="0.15"/>
  <circle cx="646" cy="65" r="8" fill="#8B5CF6"/>
  <text x="646" y="100" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#8B5CF6">Optimize</text>
  <text x="646" y="115" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748B">Tune</text>

  <!-- Step 8: Deployment -->
  <circle cx="742" cy="65" r="14" fill="#38BDF8" opacity="0.15"/>
  <circle cx="742" cy="65" r="8" fill="#38BDF8"/>
  <text x="742" y="100" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#38BDF8">Deploy</text>
  <text x="742" y="115" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748B">Ship</text>

  <!-- Step 9: Monitoring -->
  <circle cx="838" cy="65" r="14" fill="#22D3EE" opacity="0.15"/>
  <circle cx="838" cy="65" r="8" fill="#22D3EE"/>
  <text x="838" y="100" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#22D3EE">Monitor</text>
  <text x="838" y="115" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748B">Observe</text>

  <!-- Step 10: Iteration -->
  <circle cx="934" cy="65" r="14" fill="#06B6D4" opacity="0.15"/>
  <circle cx="934" cy="65" r="8" fill="#06B6D4"/>
  <text x="934" y="100" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#06B6D4">Iterate</text>
  <text x="934" y="115" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748B">Evolve</text>

  <!-- Feedback loop arrow -->
  <path d="M934,140 C934,165 70,165 70,140" stroke="#1E293B" stroke-width="1.5" fill="none" stroke-dasharray="4,4"/>
  <polygon points="70,136 66,144 74,144" fill="#1E293B"/>
  <text x="500" y="175" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" fill="#334155" letter-spacing="3">CONTINUOUS IMPROVEMENT LOOP</text>
</svg>
